name: Claude Issue Fixer

on:
  workflow_dispatch:

jobs:
  fix-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Create tracking issue
        id: create-issue
        run: |
          ISSUE_URL=$(gh issue create \
            --title "Log Analytics error report - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "Automated run triggered via workflow_dispatch. Claude will post its findings here.")
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude to fetch errors and create issues
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            You are an automated error reporter with access to Azure CLI tools.
            Post all progress and findings as comments on this GitHub issue: ${{ steps.create-issue.outputs.issue_url }}

            Step 1 — Authenticate with Azure and fetch the top 3 errors:
            - Log in using: az login --service-principal -u $AZURE_CLIENT_ID -p $AZURE_CLIENT_SECRET --tenant $AZURE_TENANT_ID
            - The Log Analytics workspace ID is in $AZ_LOG_WORKSPACE_ID, resource group in $AZ_LOG_RG, resource name in $AZ_LOG_NAME
            - First, discover what tables are available: az monitor log-analytics workspace table list --resource-group $AZ_LOG_RG --workspace-name $AZ_LOG_NAME --output table
            - Based on the available tables, write an appropriate KQL query to find the top 3 most frequent errors in the last 7 days
            - Run the query using: az monitor log-analytics query --workspace $AZ_LOG_WORKSPACE_ID --analytics-query "<your query>" --output json

            Step 2 — For each error found, create a GitHub issue:
            - Title: a short, descriptive summary of the error
            - Body: include the full error message, occurrence count, relevant time range, and which part of the codebase is likely responsible based on a quick search
            - Label each issue with "bug" and "log-analytics"
            - Post a comment on the tracking issue (${{ steps.create-issue.outputs.issue_url }}) with links to all created issues and a brief summary

            Do not attempt to fix any code. Only report and create issues.
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZ_LOG_WORKSPACE_ID: ${{ secrets.AZ_LOG_WORKSPACE_ID }}
          AZ_LOG_NAME: ${{ secrets.AZ_LOG_NAME }}
          AZ_LOG_RG: ${{ secrets.AZ_LOG_RG }}
