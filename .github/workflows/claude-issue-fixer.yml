name: Claude Issue Fixer

on:
  workflow_dispatch:

jobs:
  fix-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Fetch top 3 errors from Log Analytics
        id: fetch-errors
        env:
          AZ_LOG_WORKSPACE_ID: ${{ secrets.AZ_LOG_WORKSPACE_ID }}
          AZ_LOG_NAME: ${{ secrets.AZ_LOG_NAME }}
          AZ_LOG_RG: ${{ secrets.AZ_LOG_RG }}
        run: |
          ERRORS=$(az monitor log-analytics query \
            --workspace "$AZ_LOG_WORKSPACE_ID" \
            --analytics-query "$AZ_LOG_NAME | where Level == 'Error' or SeverityLevel == 'error' | summarize count() by Message | top 3 by count_ desc | project Message, count_" \
            --output json 2>/dev/null || echo "[]")
          echo "errors<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ERRORS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run Claude to analyze and fix issues
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            You are an automated issue fixer. Here are the top 3 errors from Azure Log Analytics for this application:

            ${{ steps.fetch-errors.outputs.errors }}

            Your task:
            1. Analyze each error message and understand what it means in the context of this codebase.
            2. Search the codebase to find the code responsible for each error.
            3. For each error that has a clear, safe fix:
               - Implement the fix on a new branch named fix/log-error-<short-slug>
               - Create a pull request with:
                 - A clear title describing what is fixed
                 - A description explaining the error from Log Analytics, root cause, and what was changed
                 - Label it "automated-fix" if that label exists
            4. If an error is ambiguous or the fix would be too risky, skip it and move on.
            5. Do not create more than 3 pull requests total.

            Be conservative: only make targeted, minimal changes. Do not refactor or change unrelated code.
